# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps
    labels:
      - dependencies
    groups:
      astro:
        patterns:
          - astro
          - '@astrojs/*'
        update-types:
          - minor
          - patch
      lint-format:
        patterns:
          - eslint*
          - '@eslint/*'
          - '@typescript-eslint/*'
          - prettier*
          - globals
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
